server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: resume-analyzer-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resume_analyzer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

# Custom application properties
app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-min-256-bits-long-for-hs256-signing}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  rate-limit:
    daily-analysis-limit: ${DAILY_ANALYSIS_LIMIT:5}

  ai:
    provider: ${AI_PROVIDER:anthropic}
    timeout-ms: ${AI_TIMEOUT_MS:60000}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1/messages}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
    groq:
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.3-70b-versatile}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1/chat/completions}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3}

logging:
  level:
    root: INFO
    com.resumeanalyzer: DEBUG
    org.springframework.security: INFO
